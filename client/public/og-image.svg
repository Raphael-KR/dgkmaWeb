<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#CB591F"/>
      <stop offset="1" stop-color="#A24617"/>
    </linearGradient>
    <linearGradient id="divider" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#EAAA00" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#EAAA00" stop-opacity="1"/>
      <stop offset="1" stop-color="#EAAA00" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <line x1="0" y1="80"  x2="1200" y2="80"  stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="0" y1="550" x2="1200" y2="550" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="1"/>

  <!-- Symbol logo medallion (right side) -->
  <circle cx="1010" cy="315" r="170" fill="#FFFFFF"/>
  <circle cx="1010" cy="315" r="170" fill="none" stroke="#EAAA00" stroke-width="3"/>

  <!-- Eyebrow -->
  <text x="80" y="175"
        font-family="Pretendard, 'Noto Sans CJK KR', sans-serif"
        font-size="22" font-weight="700" fill="#EAAA00" letter-spacing="6">DONGGUK KOREAN MEDICINE ALUMNI</text>

  <!-- Main title (동문회명) -->
  <text x="80" y="280"
        font-family="Pretendard, 'Noto Sans CJK KR', sans-serif"
        font-size="76" font-weight="700" fill="#FFFFFF" letter-spacing="-2">동국대학교</text>
  <text x="80" y="370"
        font-family="Pretendard, 'Noto Sans CJK KR', sans-serif"
        font-size="76" font-weight="700" fill="#FFFFFF" letter-spacing="-2">한의과대학동문회</text>

  <!-- Divider -->
  <rect x="80" y="410" width="320" height="3" fill="url(#divider)"/>

  <!-- Slogan (22대) -->
  <text x="80" y="495"
        font-family="Pretendard, 'Noto Sans CJK KR', sans-serif"
        font-size="48" font-weight="600" fill="#FFFFFF" letter-spacing="-1.2">따뜻한 연대, 함께하는 성장</text>
</svg>
